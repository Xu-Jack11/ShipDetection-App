name: Build Windows App

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Download model weights from Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path assets/checkpoints | Out-Null
          gh release download v0.1-models --pattern "*.pt" --dir assets/checkpoints
          $models = Get-ChildItem -Path assets/checkpoints -Filter *.pt
          if (-not $models -or $models.Count -eq 0) {
            throw "权重下载失败，assets/checkpoints 中没有 .pt 文件。"
          }
          Write-Host "已下载权重："
          $models | ForEach-Object { Write-Host " - $($_.Name) ($([math]::Round($_.Length/1MB, 1)) MB)" }

      - name: Validate bundled assets
        shell: pwsh
        run: |
          if (-not (Test-Path "assets/config.yaml")) {
            throw "缺少 assets/config.yaml，无法构建内置配置版本。"
          }
          $models = Get-ChildItem -Path "assets/checkpoints\*" -Include *.pt,*.pth -File -ErrorAction SilentlyContinue
          if (-not $models -or $models.Count -eq 0) {
            throw "缺少内置模型权重。"
          }
          Write-Host "资产验证通过，模型数量: $($models.Count)"

      - name: Build EXE with PyInstaller (bundle config + model)
        shell: pwsh
        run: |
          $pyArgs = @(
            "--noconfirm",
            "--clean",
            "--windowed",
            "--name", "SmartDetectionApp",
            "--add-data", "assets/config.yaml;assets"
          )
          $models = Get-ChildItem -Path "assets/checkpoints\*" -Include *.pt,*.pth -File
          foreach ($m in $models) {
            $pyArgs += @("--add-data", "$($m.FullName);assets/checkpoints")
          }
          $pyArgs += "run_app.py"
          pyinstaller @pyArgs

      - name: Upload build artifact (directory, no double-zip)
        uses: actions/upload-artifact@v4
        with:
          name: SmartDetectionApp-windows
          path: dist/SmartDetectionApp/

      - name: Pack build output (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          Compress-Archive -Path dist/SmartDetectionApp/* -DestinationPath dist/SmartDetectionApp-windows.zip -Force

      - name: Create GitHub Release (tag only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SmartDetectionApp-windows.zip
          generate_release_notes: true
